    // Активация канала сигналов звонков
    function initCallSignalChannel() {
        if (!myCurrentId) return;
        
        callChannel = supabaseClient.channel(`calls:${myCurrentId}`, {
            config: { broadcast: { self: false } }
        });

        callChannel
        .on('broadcast', { event: 'dial' }, payload => { handleIncomingDial(payload.payload); })
        .on('broadcast', { event: 'accept' }, payload => { handleCallAcceptedByPeer(payload.payload); })
        .on('broadcast', { event: 'hangup' }, payload => { handleCallHangupByPeer(payload.payload); })
        .on('broadcast', { event: 'media_change' }, payload => { handlePeerMediaChange(payload.payload); })
        // Дополнительные технические сигналы WebRTC для передачи медиа-трафика
        .on('broadcast', { event: 'webrtc_offer' }, async payload => {
            if (currentCallSession) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.payload.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                supabaseClient.channel(`calls:${currentCallSession.peerId}`).send({
                    type: 'broadcast', event: 'webrtc_answer', payload: { answer: answer }
                });
            }
        })
        .on('broadcast', { event: 'webrtc_answer' }, async payload => {
            if (currentCallSession && peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.payload.answer));
            }
        })
        .on('broadcast', { event: 'webrtc_ice' }, async payload => {
            if (currentCallSession && peerConnection && payload.payload.ice) {
                try { await peerConnection.addIceCandidate(new RTCIceCandidate(payload.payload.ice)); } catch(e){}
            }
        })
        .subscribe();
    }

    // Запрос камеры и микрофона (запрашивается 1 раз при старте сессии звонка)
    async function requestMediaPermissions() {
        if (localStream) return true;
        try {
            // Запрашиваем Full HD видео и звук
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" }
            });
            const localVideoTrack = document.getElementById('local-video');
            localVideoTrack.srcObject = localStream;
            localVideoTrack.classList.remove('hidden');
            return true;
        } catch (err) {
            alert("Не удалось получить доступ к камере и микрофону. Убедитесь, что сайт открыт по HTTPS!");
            return false;
        }
    }

    // Инициализация WebRTC соединения
    function createPeerConnection() {
        if (peerConnection) peerConnection.close();
        
        peerConnection = new RTCPeerConnection(rtcConfig);

        // Отправляем локальные медиа-дорожки другу
        if (localStream) {
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        }

        // Ловим медиа-поток от друга
        peerConnection.ontrack = event => {
            const remoteVideo = document.getElementById('remote-video');
            if (event.streams && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                document.getElementById('call-avatar-container').classList.add('hidden'); // прячем аву, пошло видео
            }
        };

        // Обмен интернет-узлами (ICE candidates)
        peerConnection.onicecandidate = event => {
            if (event.candidate && currentCallSession) {
                supabaseClient.channel(`calls:${currentCallSession.peerId}`).send({
type: 'broadcast', event: 'webrtc_ice', payload: { ice: event.candidate }
                });
            }
        };
    }

    // ИСХОДЯЩИЙ ЗВОНОК
    async function startCall() {
        if (!activeChatPeerId) return;

        // Запрашиваем права один раз
        const hasAccess = await requestMediaPermissions();
        if (!hasAccess) return;

        let contacts = JSON.parse(localStorage.getItem('ol_contacts_' + myCurrentId) || '{}');
        let currentPeer = contacts[activeChatPeerId] || { name: "Друг", ava: "" };

        currentCallSession = { role: 'caller', peerId: activeChatPeerId, peerName: currentPeer.name, peerAva: currentPeer.ava };

        document.getElementById('call-peer-name').innerText = currentPeer.name;
        const callAva = document.getElementById('call-peer-ava');
        callAva.classList.add('ringing');
        document.getElementById('call-avatar-container').classList.remove('hidden');
        if(currentPeer.ava) callAva.style.backgroundImage = `url(${currentPeer.ava})`; else callAva.style.backgroundImage = 'none';

        isAudioOn = true; isVideoOn = true; isFrontCamera = true;
        document.getElementById('call-toggle-audio').classList.remove('off'); document.getElementById('call-toggle-audio').innerText = "🎙️";
        document.getElementById('call-toggle-video').classList.remove('off'); document.getElementById('call-toggle-video').innerText = "📷";
        
        document.getElementById('call-active-controls').classList.remove('hidden');
        document.getElementById('call-accept-btn').classList.add('hidden');

        document.getElementById('call-status-text').innerText = "Вызов...";
        document.getElementById('call-screen').classList.add('show');

        // Создаем P2P объект
        createPeerConnection();

        // Отправляем гудок
        supabaseClient.channel(`calls:${activeChatPeerId}`).send({
            type: 'broadcast', event: 'dial',
            payload: { callerId: myCurrentId, callerName: myCurrentName, callerAva: localStorage.getItem('ol_ava_' + myCurrentId) || "" }
        });

        // Если друг не в сети — автоматическая отмена через 1 минуту
        clearTimeout(callTimeoutTimer);
        callTimeoutTimer = setTimeout(() => {
            if (currentCallSession && currentCallSession.status !== 'connected') {
                document.getElementById('call-status-text').innerText = "Абонент недоступен";
                setTimeout(() => { endCall(); }, 2000);
            }
        }, 60000);
    }

    // ВХОДЯЩИЙ ЗВОНОК
    function handleIncomingDial(data) {
        if (currentCallSession) {
            supabaseClient.channel(`calls:${data.callerId}`).send({ type: 'broadcast', event: 'hangup', payload: { from: myCurrentId } });
            return;
        }

        currentCallSession = { role: 'receiver', peerId: data.callerId, peerName: data.callerName, peerAva: data.callerAva };

        document.getElementById('call-peer-name').innerText = data.callerName;
        const callAva = document.getElementById('call-peer-ava');
        callAva.classList.add('ringing');
        document.getElementById('call-avatar-container').classList.remove('hidden');
        if(data.callerAva) callAva.style.backgroundImage = `url(${data.callerAva})`; else callAva.style.backgroundImage = 'none';

        document.getElementById('call-status-text').innerText = "Входящий вызов...";
        
        document.getElementById('call-active-controls').classList.add('hidden');
        document.getElementById('call-accept-btn').classList.remove('hidden');
        document.getElementById('call-screen').classList.add('show');

        clearTimeout(callTimeoutTimer);
        callTimeoutTimer = setTimeout(() => {
            if (currentCallSession && currentCallSession.status !== 'connected') { endCall(); }
        }, 60000);
    }

    // НАЖАТИЕ ЗЕЛЕНОЙ КНОПКИ (Взять вызов)
    async function acceptIncomingCall() {
if (!currentCallSession || currentCallSession.role !== 'receiver') return;
        
        // Запрос разрешений один раз при ответе
        const hasAccess = await requestMediaPermissions();
        if (!hasAccess) { clickHangup(); return; }

        clearTimeout(callTimeoutTimer);
        currentCallSession.status = 'connected';

        document.getElementById('call-status-text').innerText = "Подключено (E2EE сессия)";
        document.getElementById('call-peer-ava').classList.remove('ringing');
        document.getElementById('call-accept-btn').classList.add('hidden');
        document.getElementById('call-active-controls').classList.remove('hidden');

        createPeerConnection();

        // Отвечаем на вызов
        supabaseClient.channel(`calls:${currentCallSession.peerId}`).send({
            type: 'broadcast', event: 'accept', payload: { from: myCurrentId }
        });
    }

    // Собеседник принял наш звонок -> Создаем медиа-оффер (WebRTC Offer)
    async function handleCallAcceptedByPeer(data) {
        if (currentCallSession && currentCallSession.role === 'caller' && currentCallSession.peerId === data.from) {
            clearTimeout(callTimeoutTimer);
            currentCallSession.status = 'connected';
            document.getElementById('call-status-text').innerText = "Подключено (E2EE сессия)";
            document.getElementById('call-peer-ava').classList.remove('ringing');

            // Запускаем трансляцию видео
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            supabaseClient.channel(`calls:${currentCallSession.peerId}`).send({
                type: 'broadcast', event: 'webrtc_offer', payload: { offer: offer }
            });
        }
    }

    function clickHangup() {
        if (currentCallSession) {
            supabaseClient.channel(`calls:${currentCallSession.peerId}`).send({
                type: 'broadcast', event: 'hangup', payload: { from: myCurrentId }
            });
        }
        endCall();
    }

    function handleCallHangupByPeer(data) {
        if (currentCallSession && currentCallSession.peerId === data.from) {
            document.getElementById('call-status-text').innerText = "Звонок завершен";
            setTimeout(() => { endCall(); }, 1200);
        }
    }

    function endCall() {
        clearTimeout(callTimeoutTimer);
        
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('local-video').srcObject = null;
        document.getElementById('local-video').classList.add('hidden');

        currentCallSession = null;
        document.getElementById('call-screen').classList.remove('show');
    }

    function toggleCallAudio() {
        if (!localStream) return;
        isAudioOn = !isAudioOn;
        localStream.getAudioTracks().forEach(t => t.enabled = isAudioOn);
        const btn = document.getElementById('call-toggle-audio');
        btn.classList.toggle('off', !isAudioOn);
        btn.innerText = isAudioOn ? "🎙️" : "🔇";
    }

    function toggleCallVideo() {
        if (!localStream) return;
        isVideoOn = !isVideoOn;
        localStream.getVideoTracks().forEach(t => t.enabled = isVideoOn);
        const btn = document.getElementById('call-toggle-video');
        btn.classList.toggle('off', !isVideoOn);
        btn.innerText = isVideoOn ? "📷" : "❌";
        document.getElementById('local-video').classList.toggle('hidden', !isVideoOn);
    }

    async function flipCallCamera() {
        if (!localStream) return;
        isFrontCamera = !isFrontCamera;
        
        // Переключаем facingMode между селфи и основной камерой
        localStream.getVideoTracks().forEach(t => t.stop());
        try {
const newVideoStream = await navigator.mediaDevices.getUserMedia({
                video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: isFrontCamera ? "user" : "environment" }
            });
            const newTrack = newVideoStream.getVideoTracks()[0];
            localStream.addTrack(newTrack);
            
            document.getElementById('local-video').srcObject = localStream;
            
            if(peerConnection) {
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                if(sender) sender.replaceTrack(newTrack);
            }
        } catch(e){}
        
        document.getElementById('call-flip-camera').style.transform = isFrontCamera ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function handlePeerMediaChange(data) {
        if (currentCallSession && currentCallSession.peerId === data.from && currentCallSession.status === 'connected') {
            if (!data.audio) document.getElementById('call-status-text').innerText = "Микрофон собеседника выключен";
            else if (!data.video) document.getElementById('call-status-text').innerText = "Камера собеседника выключена";
            else document.getElementById('call-status-text').innerText = "Подключено (E2EE сессия)";
        }
    }

    async function start() {
        const id = document.getElementById('myId').value.trim();
        const name = document.getElementById('myName').value.trim();
        const log = document.getElementById('auth-log');
        const loader = document.getElementById('auth-loader');
        if(!id || !name) return;

        loader.classList.add('show');
        log.innerText = "";

        try {
            const { data: userExist } = await supabaseClient.from('users').select('*').eq('id', id).maybeSingle();

            if (userExist) {
                if (userExist.name !== name) {
                    log.innerText = "Этот ID уже занят другим именем!";
                    loader.classList.remove('show');
                    return;
                }
                if (userExist.ava) { localStorage.setItem('ol_ava_' + id, userExist.ava); }
            } else {
                await supabaseClient.from('users').insert([{ id: id, name: name, ava: "", last_seen: new Date().toISOString(), typing_to: "" }]);
            }

            myCurrentId = id;
            myCurrentName = name;

            localStorage.setItem('ol_id', id);
            localStorage.setItem('ol_name', name);

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('view-name').innerText = name;
            document.getElementById('view-id').innerText = "ID: " + id;

            updateAvaUI();
            renderSavedContacts();
            listenForIncomingData();
            initCallSignalChannel();
            
            updateMyStatus();
            setInterval(updateMyStatus, 3000);
            setInterval(checkContactsOnline, 3000);
        } catch(e) {
            log.innerText = "Ошибка сети. Попробуй еще раз.";
        } finally {
            loader.classList.remove('show');
        }
    }

    async function updateMyStatus() {
        if (!myCurrentId) return;
        await supabaseClient.from('users').update({ last_seen: new Date().toISOString() }).eq('id', myCurrentId);
    }

    async function checkContactsOnline() {
        if (!myCurrentId) return;

        const { data: usersData } = await supabaseClient.from('users').select('id, last_seen, typing_to');
        if (!usersData) return;

        usersData.forEach(u => {
            if (u.id === myCurrentId) return;

            const isOnline = u.last_seen && (new Date() - new Date(u.last_seen) < 6000);
            knownUsersCache[u.id] = isOnline; 

            const dot = document.getElementById('dot-' + u.id);
            if (dot) {
if (isOnline) dot.classList.add('online'); else dot.classList.remove('online');
            }

            // ИСПРАВЛЕНО: Теперь статус в шапке чата обновляется постоянно!
            if (u.id === activeChatPeerId) {
                const chatDot = document.getElementById('peer-status-dot');
                const chatTxt = document.getElementById('chat-peer-status-text');
                
                if (isOnline) {
                    chatDot.classList.add('online');
                    if (u.typing_to === myCurrentId) {
                        chatTxt.innerHTML = `печатает<span class="typing-dots"><span></span><span></span><span></span></span>`;
                        chatTxt.style.color = "var(--blue)";
                    } else {
                        chatTxt.innerText = "в сети";
                        chatTxt.style.color = "var(--green)";
                    }
                } else {
                    chatDot.classList.remove('online');
                    chatTxt.innerText = "был(а) недавно";
                    chatTxt.style.color = "var(--gray)";
                }
            }
        });
    }

    async function handleTyping() {
        if (!activeChatPeerId) return;
        await supabaseClient.from('users').update({ typing_to: activeChatPeerId }).eq('id', myCurrentId);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(async () => {
            await supabaseClient.from('users').update({ typing_to: "" }).eq('id', myCurrentId);
        }, 2000);
    }

    async function sendReq() {
        const tid = document.getElementById('targetId').value.trim();
        const log = document.getElementById('search-log');
        const btn = document.getElementById('search-btn');
        if(!tid || tid === myCurrentId) return;

        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> <span>Поиск друзей...</span>`;
        log.innerText = "";

        try {
            const { data: targetUser } = await supabaseClient.from('users').select('*').eq('id', tid).maybeSingle();
            if (!targetUser) {
                log.style.color = "red"; log.innerText = "Пользователь с таким ID не существует!"; return;
            }
            const myAva = localStorage.getItem('ol_ava_' + myCurrentId) || "";
            const { error } = await supabaseClient.from('messages').insert([
                { sender: myCurrentId, receiver: tid, text: myCurrentName, media: myAva, type: 'request' }
            ]);
            if(!error) {
                log.style.color = "green"; log.innerText = "Заявка успешно отправлена!"; document.getElementById('targetId').value = "";
            } else {
                log.style.color = "red"; log.innerText = "Не удалось отправить заявку.";
            }
        } catch(e) { log.style.color = "red"; log.innerText = "Ошибка запроса к базе."; }
        finally { btn.disabled = false; btn.innerHTML = `<span id="search-btn-text">Отправить заявку</span>`; }
    }

    function listenForIncomingData() {
        supabaseClient.channel('public:messages')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                if (payload.eventType === 'DELETE' || payload.eventType === 'UPDATE') {
                    if (activeChatPeerId) loadChatHistory(activeChatPeerId);
                    return;
                }
                const row = payload.new;
                if (row.receiver === myCurrentId && row.type === 'request') showIncomingRequestUI(row.sender, row.text, row.media);
                if (row.receiver === myCurrentId && row.type === 'accept') saveContact(row.sender, row.text, row.media);
                if (row.type === 'chat' && ((row.sender === activeChatPeerId && row.receiver === myCurrentId) || (row.sender === myCurrentId && row.receiver === activeChatPeerId))) {
                    loadChatHistory(activeChatPeerId);
                }
            }).subscribe();
checkExistingRequests();
    }

    async function checkExistingRequests() {
        const { data } = await supabaseClient.from('messages').select('*').eq('receiver', myCurrentId).eq('type', 'request');
        if(data) data.forEach(req => showIncomingRequestUI(req.sender, req.text, req.media));
    }

    function showIncomingRequestUI(id, name, ava) {
        const list = document.getElementById('req-list');
        if(list.querySelector('p')) list.innerHTML = '';
        if(document.getElementById('req-item-' + id)) return;

        const div = document.createElement('div');
        div.id = 'req-item-' + id;
        div.style = "display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:5px 0; border-bottom:1px solid #eee;";
        let bgStyle = ava ? `background-image:url(${ava})` : '';
        div.innerHTML = `
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="ava-wrapper"><div class="chat-ava" style="${bgStyle}"></div></div>
                <span><b>${name} (ID: ${id})</b></span>
            </div>
            <button class="btn" style="width:80px; padding:8px; margin:0; font-size:13px;" onclick="acceptReq('${id}','${name}','${ava}')">Принять</button>
        `;
        list.appendChild(div);

        const badge = document.getElementById('badge');
        badge.innerText = list.children.length;
        badge.style.display = 'block';
    }

    async function acceptReq(id, name, ava) {
        saveContact(id, name, ava);
        const myAva = localStorage.getItem('ol_ava_' + myCurrentId) || "";
        await supabaseClient.from('messages').insert([{ sender: myCurrentId, receiver: id, text: myCurrentName, media: myAva, type: 'accept' }]);
        await supabaseClient.from('messages').delete().eq('sender', id).eq('receiver', myCurrentId).eq('type', 'request');
        document.getElementById('req-item-' + id).remove();
        
        const list = document.getElementById('req-list');
        const badge = document.getElementById('badge');
        if(list.children.length === 0) { badge.style.display = 'none'; list.innerHTML = '<p style="color:gray; text-align:center;">Пусто</p>'; } else { badge.innerText = list.children.length; }

        openChat(id, name, ava);
        nav('chat', document.querySelectorAll('.nav-item')[3]);
    }

    async function send() {
        const input = document.getElementById('m-input');
        if(!input.value.trim() || !activeChatPeerId) return;
        const txt = input.value.trim();
        input.value = "";

        await supabaseClient.from('users').update({ typing_to: "" }).eq('id', myCurrentId);

        if (isEditingMode && selectedMsgId) {
            await supabaseClient.from('messages').update({ text: txt, is_edited: true }).eq('id', selectedMsgId);
            isEditingMode = false; selectedMsgId = null; document.getElementById('send-btn').innerText = ">";
        } else {
            await supabaseClient.from('messages').insert([{ sender: myCurrentId, receiver: activeChatPeerId, text: txt, media: "", type: 'chat' }]);
        }
        loadChatHistory(activeChatPeerId);
    }

    async function loadChatHistory(peerId) {
        const { data } = await supabaseClient.from('messages')
            .select('*').eq('type', 'chat')
            .or(`and(sender.eq.${myCurrentId},receiver.eq.${peerId}),and(sender.eq.${peerId},receiver.eq.${myCurrentId})`)
            .order('created_at', { ascending: true });

        const win = document.getElementById('chat-win');
        win.innerHTML = '';
        
        const cryptoBadge = document.createElement('div');
        cryptoBadge.className = 'crypto-badge';
        cryptoBadge.innerHTML = '🔒 Соединение защищено сквозным шифрованием E2EE. Ваша переписка конфиденциальна.';
        win.appendChild(cryptoBadge);
        
        if(data) {
            data.forEach((msg) => {
                const direction = msg.sender === myCurrentId ? 'out' : 'in';
const d = document.createElement('div');
                d.className = 'bubble ' + direction;
                if (direction === 'out') d.onclick = () => openMsgMenu(msg.id, msg.text);

                if(msg.media) {
                    const img = document.createElement('img'); img.src = msg.media; d.appendChild(img);
                } else { 
                    d.innerText = msg.text; 
                    if (msg.is_edited) {
                        const ed = document.createElement('span'); ed.className = 'edited-label'; ed.innerText = ' (изм.)'; d.appendChild(ed);
                    }
                }
                win.appendChild(d);
            });
        }
        win.scrollTop = win.scrollHeight;
    }

    function openMsgMenu(id, text) {
        selectedMsgId = id; selectedMsgText = text;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('msg-menu').classList.add('open');
    }

    function closeMsgMenu() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('msg-menu').classList.remove('open');
    }

    function triggerEdit() {
        closeMsgMenu(); isEditingMode = true;
        const input = document.getElementById('m-input');
        input.value = selectedMsgText; input.focus();
        document.getElementById('send-btn').innerText = "💾";
    }

    async function triggerDelete() {
        closeMsgMenu();
        if (confirm("Удалить это сообщение для всех?")) {
            await supabaseClient.from('messages').delete().eq('id', selectedMsgId);
            loadChatHistory(activeChatPeerId);
        }
    }

    document.getElementById('media-input').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async function() { 
            await supabaseClient.from('messages').insert([{ sender: myCurrentId, receiver: activeChatPeerId, text: "", media: reader.result, type: 'chat' }]);
            loadChatHistory(activeChatPeerId);
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('ava-input').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async function(event) {
            const imgData = event.target.result;
            localStorage.setItem('ol_ava_' + myCurrentId, imgData);
            updateAvaUI();
            await supabaseClient.from('users').update({ ava: imgData }).eq('id', myCurrentId);
        };
        reader.readAsDataURL(file);
    };

    function updateAvaUI() {
        const ava = localStorage.getItem('ol_ava_' + myCurrentId);
        const myAvaDiv = document.getElementById('my-ava');
        if(ava) { myAvaDiv.style.backgroundImage = `url(${ava})`; myAvaDiv.innerHTML = ''; }
    }

    function saveContact(id, name, ava) {
        let contacts = JSON.parse(localStorage.getItem('ol_contacts_' + myCurrentId) || '{}');
        contacts[id] = { name: name, ava: ava };
        localStorage.setItem('ol_contacts_' + myCurrentId, JSON.stringify(contacts));
        renderSavedContacts();
    }

    function renderSavedContacts() {
        const list = document.getElementById('contacts-list');
        list.innerHTML = '';
        let contacts = JSON.parse(localStorage.getItem('ol_contacts_' + myCurrentId) || '{}');
        if (Object.keys(contacts).length === 0) {
            list.innerHTML = '<p style="color:gray; text-align:center; font-size:14px;">Пока нет контактов</p>'; return;
        }
        for (let id in contacts) {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.onclick = () => { openChat(id, contacts[id].name, contacts[id].ava); nav('chat', document.querySelectorAll('.nav-item')[3]); };
            let bgStyle = contacts[id].ava ? `background-image:url(${contacts[id].ava})` : '';
div.innerHTML = `
                <div class="ava-wrapper">
                    <div class="chat-ava" style="${bgStyle}"></div>
                    <div id="dot-${id}" class="status-dot"></div>
                </div>
                <div>
                    <b>${contacts[id].name}</b><br><span style="font-size:12px; color:gray;">ID: ${id}</span>
                </div>
            `;
            list.appendChild(div);
        }
    }

    function openChat(id, name, ava) {
        activeChatPeerId = id;
        document.getElementById('chat-with').innerText = name;
        const pAva = document.getElementById('peer-ava');
        if(ava) pAva.style.backgroundImage = `url(${ava})`; else pAva.style.backgroundImage = 'none';
        
        document.getElementById('chat-empty').classList.add('hidden');
        document.getElementById('chat-ui').classList.remove('hidden');
        
        checkContactsOnline();
        loadChatHistory(id);
    }

    function nav(t, e) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + t).classList.remove('hidden');
        if(e) e.classList.add('active');

        const versionTag = document.getElementById('version-tag');
        if (t === 'chat') {
            versionTag.style.opacity = '0';
            setTimeout(() => { if(versionTag.style.opacity === '0') versionTag.style.display = 'none'; }, 200);
        } else {
            versionTag.style.display = 'block';
            setTimeout(() => versionTag.style.opacity = '1', 10);
        }
    }

    function logout() { 
        localStorage.removeItem('ol_id'); localStorage.removeItem('ol_name'); location.reload(); 
    }

    window.onload = () => {
        const savedId = localStorage.getItem('ol_id');
        const savedName = localStorage.getItem('ol_name');
        if(savedId && savedName) {
            document.getElementById('myId').value = savedId;
            document.getElementById('myName').value = savedName;
            start();
        }
    }
</script>
</body>
</html>
